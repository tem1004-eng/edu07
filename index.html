<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주일학교 출석부</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#56ab2f">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        #app-container { width: 100%; max-width: 480px; background-color: #fff; min-height: 100vh; position: relative; }
        
        /* 헤더 (날짜 표시 및 달력 호출) */
        .header { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); padding: 30px 20px; color: white; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-size: 1.5em; font-weight: 700; }
        .current-date-display { margin-top: 10px; font-size: 1.1em; font-weight: 500; background: rgba(255,255,255,0.2); display: inline-block; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        
        /* 출석 리스트 영역 */
        .list-container { padding: 20px; padding-bottom: 90px; }
        .attendance-summary { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 700; color: #555; font-size: 0.9em; }
        .student-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .student-info { flex: 1; }
        .student-name { font-weight: 700; color: #333; font-size: 1.1em; }
        .status-badge { font-size: 0.8em; padding: 3px 8px; border-radius: 5px; margin-left: 5px; }
        .badge-present { background: #e8f5e9; color: #2e7d32; }
        .badge-absent { background: #ffebee; color: #c62828; }
        
        /* 모달 팝업 공통 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; }
        .modal-title { font-weight: 700; margin-bottom: 15px; text-align: center; font-size: 1.2em; }
        
        /* 입력 폼 스타일 */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85em; color: #777; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: inherit; font-size: 1em; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1em; }
        .btn-primary { background: #56ab2f; color: white; }
        .btn-secondary { background: #eee; color: #555; }
        
        /* 달력 스타일 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day-head { font-weight: 700; font-size: 0.8em; color: #999; padding: 5px 0; }
        .calendar-day-head:first-child { color: #f44336; } /* 일요일은 빨간색 */
        .calendar-cell { padding: 10px 0; border-radius: 8px; cursor: pointer; font-size: 0.9em; }
        .calendar-cell:active { background: #e0e0e0; }
        .calendar-cell.selected { background: #56ab2f; color: white; font-weight: 700; }

        /* 플로팅 + 버튼 */
        .fab { position: fixed; bottom: 25px; right: 25px; width: 56px; height: 56px; background: #FF9800; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: none; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <h2>🌱 주일학교 출석부</h2>
        <div class="current-date-display" id="dateDisplay" onclick="openCalendar()">오늘 날짜 불러오는 중...</div>
    </div>

    <div class="list-container">
        <div class="attendance-summary" id="attendanceSummary">
            <span>참석인원: 0명</span>
            <span>결석인원: 0명</span>
        </div>
        <div id="studentList">
            </div>
    </div>

    <button class="fab" onclick="openAddModal()">+</button>
</div>

<div class="modal" id="addModal">
    <div class="modal-content">
        <div class="modal-title">새 학생 등록</div>
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="newName" placeholder="이름을 입력하세요">
        </div>
        <div class="input-group">
            <label>전화번호</label>
            <input type="tel" id="newPhone" placeholder="예: 010-1234-5678">
        </div>
        <div class="input-group">
            <label>생년월일 (달력 선택)</label>
            <input type="date" id="newBirth">
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="addStudent()">등록하기</button>
            <button class="btn btn-secondary" onclick="closeModal('addModal')">취소</button>
        </div>
    </div>
</div>

<div class="modal" id="calendarModal">
    <div class="modal-content">
        <div class="modal-title">날짜 선택</div>
        <div class="calendar-grid" id="calendarGrid">
            </div>
        <div class="btn-row" style="margin-top: 15px;">
            <button class="btn btn-secondary" style="width: 100%;" onclick="closeModal('calendarModal')">닫기</button>
        </div>
    </div>
</div>

<script>
    // 앱 데이터 초기화 (로컬 스토리지 활용)
    let students = JSON.parse(localStorage.getItem('ss_students_final')) || [];
    let attendance = JSON.parse(localStorage.getItem('ss_attendance_final')) || {}; 
    
    // 한국 시간 기준으로 오늘 날짜 가져오기
    const krTime = new Date(new Date().getTime() + (9 * 60 * 60 * 1000));
    let currentSelectedDate = krTime.toISOString().split('T')[0];

    // ==========================================
    // 달력 관련 기능
    // ==========================================
    function openCalendar() {
        document.getElementById('calendarModal').style.display = 'flex';
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const dayHeads = ['일', '월', '화', '수', '목', '금', '토'];
        dayHeads.forEach(d => grid.innerHTML += `<div class="calendar-day-head">${d}</div>`);

        // 선택된 날짜가 속한 달을 기준으로 달력을 그림
        const selectedDateObj = new Date(currentSelectedDate);
        const start = new Date(selectedDateObj.getFullYear(), selectedDateObj.getMonth(), 1);
        const last = new Date(selectedDateObj.getFullYear(), selectedDateObj.getMonth() + 1, 0);

        for (let i = 0; i < start.getDay(); i++) grid.innerHTML += '<div></div>';

        for (let d = 1; d <= last.getDate(); d++) {
            const dateStr = `${selectedDateObj.getFullYear()}-${String(selectedDateObj.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isSelected = dateStr === currentSelectedDate;
            grid.innerHTML += `<div class="calendar-cell ${isSelected ? 'selected' : ''}" onclick="selectDate('${dateStr}')">${d}</div>`;
        }
    }

    function selectDate(dateStr) {
        currentSelectedDate = dateStr;
        const d = new Date(dateStr);
        const week = ['일', '월', '화', '수', '목', '금', '토'];
        document.getElementById('dateDisplay').innerText = `${dateStr} (${week[d.getDay()]})`;
        closeModal('calendarModal');
        renderList();
    }

    // ==========================================
    // 출석 리스트 렌더링 기능
    // ==========================================
    function renderList() {
        const listDiv = document.getElementById('studentList');
        listDiv.innerHTML = '';
        const dayData = attendance[currentSelectedDate] || {};
        
        let presentCount = 0;
        let absentCount = 0;

        // 가나다순 정렬
        students.sort((a,b) => a.name.localeCompare(b.name, 'ko'));

        students.forEach((s) => {
            const isPresent = dayData[s.id] || false;
            isPresent ? presentCount++ : absentCount++;

            listDiv.innerHTML += `
                <div class="student-card">
                    <div class="student-info">
                        <span class="student-name">${s.name}</span>
                        <span class="status-badge ${isPresent ? 'badge-present' : 'badge-absent'}">${isPresent ? '출석' : '결석'}</span>
                    </div>
                    <div class="quick-check">
                        <input type="checkbox" style="width:24px; height:24px; accent-color:#56ab2f;" ${isPresent ? 'checked' : ''} onchange="toggleAttendance('${s.id}')">
                    </div>
                </div>
            `;
        });

        if(students.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center; padding:30px; color:#999;">학생 명단이 없습니다.<br>우측 하단의 + 버튼을 눌러 추가해주세요.</div>';
        }

        document.getElementById('attendanceSummary').innerHTML = `<span>참석인원: ${presentCount}명</span> <span>결석인원: ${absentCount}명</span>`;
    }

    function toggleAttendance(id) {
        if (!attendance[currentSelectedDate]) attendance[currentSelectedDate] = {};
        attendance[currentSelectedDate][id] = !attendance[currentSelectedDate][id];
        localStorage.setItem('ss_attendance_final', JSON.stringify(attendance));
        renderList();
    }

    // ==========================================
    // 새 학생 추가 기능
    // ==========================================
    function openAddModal() { 
        document.getElementById('addModal').style.display = 'flex'; 
    }
    
    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
    }

    function addStudent() {
        const nameInput = document.getElementById('newName').value.trim();
        const phoneInput = document.getElementById('newPhone').value;
        const birthInput = document.getElementById('newBirth').value;
        
        if(!nameInput) {
            alert('이름을 입력해주세요!');
            return;
        }

        // 고유 ID 부여 및 데이터 저장
        const newStudent = { 
            id: 'stu_' + Date.now().toString(), 
            name: nameInput, 
            phone: phoneInput, 
            birth: birthInput 
        };
        
        students.push(newStudent);
        localStorage.setItem('ss_students_final', JSON.stringify(students));
        
        // 입력창 비우기
        document.getElementById('newName').value = '';
        document.getElementById('newPhone').value = '';
        document.getElementById('newBirth').value = '';
        
        closeModal('addModal');
        renderList(); // 리스트 새로고침
    }

    // 앱이 처음 실행될 때 오늘 날짜로 화면 세팅
    window.onload = () => {
        selectDate(currentSelectedDate);
    };
</script>

</body>
</html>
